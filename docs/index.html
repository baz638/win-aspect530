<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aspect 1.05</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h1 {
  margin-top:80px;
  font-size:48px;
  font-weight:600;
}

#searchBox {
  margin-top:30px;
  width:500px;
  display:flex;
  gap:10px;
}

input {
  flex:1;
  padding:12px;
  border:none;
  border-radius:8px;
  outline:none;
  font-size:16px;
}

button {
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#1e90ff;
  color:white;
  cursor:pointer;
}

#quickLinks {
  margin-top:30px;
  display:flex;
  gap:15px;
}

.linkBtn {
  padding:10px 15px;
  background:#222;
  border-radius:8px;
  cursor:pointer;
}

iframe {
  margin-top:40px;
  width:90%;
  height:70vh;
  border:none;
  border-radius:10px;
  background:white;
}
</style>
</head>

<body>

<h1>Aspect 1.05</h1>

<div id="searchBox">
  <input id="input" placeholder="Search or enter URL">
  <button onclick="go()">Go</button>
</div>

<div id="quickLinks">
  <div class="linkBtn" onclick="quick('https://duckduckgo.com')">DuckDuckGo</div>
  <div class="linkBtn" onclick="quick('https://example.com')">Example</div>
</div>

<iframe id="frame"></iframe>

<script>
const backend = "https://aspect-proxy-backend-production.up.railway.app/proxy?url=";

function formatURL(input) {
  if (!input.startsWith("http")) {
    return "https://duckduckgo.com/?q=" + encodeURIComponent(input);
  }
  return input;
}

function go() {
  let val = document.getElementById("input").value.trim();
  if (!val) return;

  let url = formatURL(val);
  document.getElementById("frame").src = backend + encodeURIComponent(url);
}

function quick(url) {
  document.getElementById("frame").src = backend + encodeURIComponent(url);
}

// enter key support
document.getElementById("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") go();
});
</script>

</body>
</html>
