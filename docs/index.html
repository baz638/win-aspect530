<!DOCTYPE html>
<html>
<head>
  <title>Aspect Browser</title>
  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial;
    }

    #topbar {
      display: flex;
      padding: 10px;
      background: #1a1a1a;
    }

    #url {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 15px;
    }

    button {
      margin-left: 8px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #333;
      color: white;
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 60px);
      border: none;
    }
  </style>
</head>
<body>

<div id="topbar">
  <input id="url" placeholder="Search or enter URL..." />
  <button onclick="go()">Go</button>
  <button onclick="duck()">Duck</button>
</div>

<iframe id="frame"></iframe>

<script>
function go() {
  let input = document.getElementById("url").value.trim();

  if (!input) return;

  // if user typed a URL
  if (input.startsWith("http")) {
    loadProxy(input);
  } else if (input.includes(".")) {
    loadProxy("https://" + input);
  } else {
    // search fallback
    duck();
  }
}

function duck() {
  let input = document.getElementById("url").value.trim();
  let search = "https://duckduckgo.com/?q=" + encodeURIComponent(input);

  loadProxy(search);
}

function loadProxy(url) {
  let frame = document.getElementById("frame");

  // try multiple proxy methods
  let proxies = [
    "https://api.allorigins.win/raw?url=",
    "https://corsproxy.io/?",
    "https://api.codetabs.com/v1/proxy?quest="
  ];

  let index = 0;

  function tryNext() {
    if (index >= proxies.length) {
      alert("blocked on all proxies bro 💔");
      return;
    }

    frame.src = proxies[index] + encodeURIComponent(url);
    index++;
  }

  // try first one
  tryNext();

  // if it fails, try next after delay
  frame.onload = () => {
    console.log("loaded maybe");
  };

  frame.onerror = () => {
    tryNext();
  };
}
</script>

</body>
</html>
