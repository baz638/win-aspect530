<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aspect Browser</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0f0f0f;
        font-family: Arial, sans-serif;
        overflow: hidden;
        color: white;
    }

    .container {
        text-align: center;
    }

    h1 {
        font-size: 60px;
        opacity: 0;
        animation: fadeIn 2s ease forwards;
    }

    @keyframes fadeIn {
        to { opacity: 1; }
    }

    .search-box {
        margin-top: 30px;
        display: flex;
        justify-content: center;
    }

    input {
        width: 400px;
        padding: 15px;
        font-size: 18px;
        border: none;
        outline: none;
        border-radius: 30px 0 0 30px;
    }

    button {
        padding: 15px 20px;
        font-size: 18px;
        border: none;
        cursor: pointer;
        background: #1f1f1f;
        color: white;
        border-radius: 0 30px 30px 0;
        transition: 0.2s;
    }

    button:hover {
        background: #333;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Aspect Browser</h1>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search the web...">
        <button onclick="search()">➜</button>
    </div>
</div>

<script>
function search() {
    let query = document.getElementById("searchInput").value;
    if(query.trim() !== "") {
        window.location.href = "https://duckduckgo.com/?q=" + encodeURIComponent(query);
    }
}

// ENTER key support
document.getElementById("searchInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        search();
    }
});
</script>

</body>
</html>
