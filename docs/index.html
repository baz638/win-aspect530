<!DOCTYPE html>
<html>
<head>
<title>Aspect 1.05</title>

<style>
body {
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:sans-serif;
}

#topbar {
  display:flex;
  padding:10px;
  background:#1a1a1a;
  gap:10px;
}

#input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:6px;
}

button {
  padding:10px;
  border:none;
  border-radius:6px;
  background:#1e90ff;
  color:white;
  cursor:pointer;
}

iframe {
  width:100%;
  height:calc(100vh - 60px);
  border:none;
  background:white;
}
</style>
</head>

<body>

<div id="topbar">
  <input id="input" placeholder="Search or enter URL">
  <button onclick="go()">Go</button>
</div>

<iframe id="frame"></iframe>

<script>
const backend = "https://aspect-proxy-backend-production.up.railway.app/proxy?url=";

function fixURL(val) {
  if (!val.startsWith("http")) {
    return "https://duckduckgo.com/?q=" + encodeURIComponent(val);
  }
  return val;
}

function go() {
  let val = document.getElementById("input").value.trim();
  if (!val) return;

  let url = fixURL(val);
  document.getElementById("frame").src = backend + encodeURIComponent(url);
}

document.getElementById("input").addEventListener("keydown", (e)=>{
  if(e.key==="Enter") go();
});
</script>

</body>
</html>
