<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aspect Browser</title>

<style>
:root {
    --bg: linear-gradient(135deg,#1a0033,#000);
    --anim: all 0.4s ease;
}

body {
    margin:0;
    height:100vh;
    background:var(--bg);
    color:white;
    font-family:Arial;
    overflow:hidden;
}

/* SIDEBAR */
.sidebar {
    position:fixed;
    left:0;
    top:0;
    width:60px;
    height:100%;
    background:#0a0a0a;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:10px;
    transition:var(--anim);
}
.sidebar button {
    width:40px;
    height:40px;
    border-radius:10px;
}

/* SETTINGS FULLSCREEN */
.settings {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0f0f0f;
    display:none;
    flex-direction:column;
    padding:30px;
    z-index:5;
    gap:20px;
}

.row {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    border-bottom:1px solid #333;
}

/* TOPBAR */
.topbar {
    display:none;
    position:fixed;
    top:0;
    width:100%;
    background:#111;
    padding:10px;
    display:flex;
    gap:10px;
}
.topbar input {
    flex:1;
    padding:8px;
}

/* HOME */
.home {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    transition:var(--anim);
}

h1 {
    font-size:70px;
    text-shadow:0 0 20px purple,0 0 50px white;
}

/* FRAME */
iframe {
    width:100%;
    height:100%;
    border:none;
    display:none;
}

/* VERSION */
.version {
    position:fixed;
    bottom:10px;
    right:10px;
    opacity:0.6;
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">
    <button onclick="openSettings()">⚙️</button>
</div>

<div class="settings" id="settings">
    <h2>Settings</h2>

    <div class="row">
        <span>Animations</span>
        <input type="checkbox" id="animToggle" checked>
    </div>

    <div class="row">
        <span>Theme</span>
        <div>
            <button onclick="setTheme('purple')">Purple</button>
            <button onclick="setTheme('blue')">Blue</button>
            <button onclick="setTheme('red')">Red</button>
        </div>
    </div>

    <div class="row">
        <span>Particles</span>
        <input type="checkbox" id="particlesToggle" checked>
    </div>

    <button onclick="saveSettings()">Save</button>
    <button onclick="closeSettings()">Back</button>
</div>

<div class="topbar" id="topbar">
    <button onclick="back()">←</button>
    <button onclick="forward()">→</button>
    <button onclick="home()">🏠</button>
    <input id="urlBar" placeholder="Enter URL or search">
</div>

<div class="home" id="home">
    <h1>Aspect Browser</h1>
    <input id="searchInput" placeholder="Search or URL">
</div>

<iframe id="frame"></iframe>

<div class="version">version 1.03 aspect</div>

<script>
// proxy endpoint (change if needed)
const proxy = "https://api.allorigins.win/raw?url=";

// LOAD PAGE
function go(input){
    let url = input;

    if(!url.startsWith("http")){
        url = "https://duckduckgo.com/?q=" + input;
    }

    document.getElementById("frame").src = proxy + encodeURIComponent(url);

    document.getElementById("frame").style.display="block";
    document.getElementById("home").style.display="none";
    document.getElementById("topbar").style.display="flex";
    document.getElementById("sidebar").style.display="none";

    document.getElementById("urlBar").value = url;
}

// ENTER SEARCH
document.getElementById("searchInput").addEventListener("keydown", e=>{
    if(e.key==="Enter") go(e.target.value);
});

// URL BAR ENTER
document.getElementById("urlBar").addEventListener("keydown", e=>{
    if(e.key==="Enter") go(e.target.value);
});

// NAV
function back(){ history.back(); }
function forward(){ history.forward(); }

function home(){
    document.getElementById("frame").style.display="none";
    document.getElementById("home").style.display="block";
    document.getElementById("topbar").style.display="none";
    document.getElementById("sidebar").style.display="flex";
}

// SETTINGS
function openSettings(){
    document.getElementById("settings").style.display="flex";
}

function closeSettings(){
    document.getElementById("settings").style.display="none";
}

function setTheme(type){
    if(type==="purple") document.body.style.background="linear-gradient(135deg,#1a0033,#000)";
    if(type==="blue") document.body.style.background="linear-gradient(135deg,#001f3f,#000)";
    if(type==="red") document.body.style.background="linear-gradient(135deg,#3f0000,#000)";
}

function saveSettings(){
    let anim = document.getElementById("animToggle").checked;
    document.documentElement.style.setProperty("--anim", anim ? "all 0.4s ease":"none");
}
</script>

</body>
</html>
