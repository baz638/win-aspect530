<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aspect Proxy Browser</title>
<style>
  body { font-family: sans-serif; margin:0; padding:0; background:#111; color:#fff; display:flex; flex-direction:column; align-items:center; }
  #controls { padding:10px; display:flex; gap:5px; width:100%; max-width:800px; }
  #urlInput { flex:1; padding:8px; border-radius:4px; border:none; }
  #goBtn { padding:8px 12px; border-radius:4px; border:none; background:#1e90ff; color:#fff; cursor:pointer; }
  #proxyFrame { width:100%; height:80vh; border:none; margin-top:10px; border-radius:4px; }
</style>
</head>
<body>

<div id="controls">
  <input type="text" id="urlInput" placeholder="Enter website URL or search term">
  <button id="goBtn">Go</button>
</div>

<iframe id="proxyFrame"></iframe>

<script>
const goBtn = document.getElementById('goBtn');
const urlInput = document.getElementById('urlInput');
const proxyFrame = document.getElementById('proxyFrame');

// YOUR RAILWAY BACKEND
const backendURL = "https://aspect-proxy-backend-production.up.railway.app/proxy?url=";

goBtn.onclick = () => {
  let val = urlInput.value.trim();
  if (!val) return alert("Type a URL or search term");

  // if it’s not a URL, treat as DuckDuckGo search
  if (!val.startsWith("http")) {
    val = "https://duckduckgo.com/?q=" + encodeURIComponent(val);
  }

  proxyFrame.src = backendURL + encodeURIComponent(val);
}
</script>

</body>
</html>
