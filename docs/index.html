<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aspect Browser</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        background: #0f0f0f;
        font-family: Arial, sans-serif;
        color: white;
        display: flex;
        flex-direction: column;
    }

    .top {
        text-align: center;
        margin-top: 100px;
        transition: 0.5s;
    }

    h1 {
        font-size: 60px;
        opacity: 0;
        animation: fadeIn 2s ease forwards;
    }

    @keyframes fadeIn {
        to { opacity: 1; }
    }

    .search-box {
        margin-top: 20px;
        display: flex;
        justify-content: center;
    }

    input {
        width: 400px;
        padding: 15px;
        font-size: 18px;
        border: none;
        outline: none;
        border-radius: 30px 0 0 30px;
    }

    button {
        padding: 15px 20px;
        font-size: 18px;
        border: none;
        cursor: pointer;
        background: #1f1f1f;
        color: white;
        border-radius: 0 30px 30px 0;
    }

    iframe {
        flex: 1;
        width: 100%;
        border: none;
        display: none;
    }

    .version {
        position: fixed;
        bottom: 10px;
        right: 15px;
        font-size: 14px;
        opacity: 0.6;
    }
</style>
</head>
<body>

<div class="top" id="topArea">
    <h1>Aspect Browser</h1>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search the web...">
        <button onclick="search()">➜</button>
    </div>
</div>

<iframe id="browserFrame"></iframe>

<div class="version">version 1.01 aspect</div>

<script>
function search() {
    let query = document.getElementById("searchInput").value;
    if(query.trim() !== "") {
        let frame = document.getElementById("browserFrame");
        frame.src = "https://duckduckgo.com/?q=" + encodeURIComponent(query);

        frame.style.display = "block";
        document.getElementById("topArea").style.marginTop = "10px";
    }
}

document.getElementById("searchInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        search();
    }
});
</script>

</body>
</html>
